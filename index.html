<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Забрать айфон и накрутку</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a18;
      --gold1: #ffe27a;
      --gold2: #ffb33e;
      --pink:  #ff4dd8;
      --cyan:  #22d3ee;
      --purple:#a855f7;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Animated background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, #14142e 0%, #0a0a18 70%);
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(70px); opacity: .55;
      animation: float 14s ease-in-out infinite;
    }
    .blob.b1 { width: 60vw; height: 60vw; top: -15%; left: -15%; background: #a855f7; }
    .blob.b2 { width: 55vw; height: 55vw; bottom: -20%; right: -15%; background: #22d3ee; animation-delay: -4s; }
    .blob.b3 { width: 45vw; height: 45vw; top: 35%; left: 30%; background: #ff3ea5; animation-delay: -8s; opacity: .4; }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(8%, -6%) scale(1.12); }
      66%     { transform: translate(-6%, 8%) scale(.92); }
    }

    /* ── Sparkles ── */
    .spark { position: absolute; z-index: 1; font-size: 24px; opacity: 0; animation: rise 5s linear infinite; pointer-events: none; }
    @keyframes rise {
      0%   { transform: translateY(20px) scale(.6) rotate(0deg); opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.1) rotate(220deg); opacity: 0; }
    }

    /* ── Main ── */
    .wrap {
      position: relative; z-index: 2;
      height: 100vh; width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }

    .emoji-row {
      font-size: 46px; margin-bottom: 18px;
      animation: pop .7s cubic-bezier(.18,.9,.3,1.4) both;
      filter: drop-shadow(0 0 18px rgba(255,180,60,.5));
    }
    .emoji-row span { display: inline-block; animation: bob 2.6s ease-in-out infinite; }
    .emoji-row span:nth-child(2) { animation-delay: .4s; }
    .emoji-row span:nth-child(3) { animation-delay: .8s; }
    @keyframes bob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-12px) rotate(4deg); } }

    /* ── Big headline ── */
    .headline {
      font-size: clamp(40px, 13vw, 92px);
      font-weight: 900; line-height: .98; letter-spacing: -1px;
      text-transform: uppercase;
      animation: dropIn .8s cubic-bezier(.18,.9,.3,1.3) both;
    }
    .headline .line { display: block; }
    .grad {
      background: linear-gradient(100deg, #ffe27a, #ffb33e, #ff5ea8, #22d3ee, #a855f7, #ffe27a);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: flow 4s linear infinite;
      filter: drop-shadow(0 0 26px rgba(255,160,80,.35)) drop-shadow(0 0 50px rgba(168,85,247,.25));
    }
    @keyframes flow { to { background-position: 300% 50%; } }
    @keyframes dropIn { 0% { opacity: 0; transform: translateY(-40px) scale(.8); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pop   { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }

    .headline-glow {
      position: relative;
      animation: pulseGlow 2.4s ease-in-out infinite;
    }
    @keyframes pulseGlow { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.18); } }

    .sub {
      margin-top: 18px; font-size: clamp(14px, 4.2vw, 19px); font-weight: 700;
      color: #c9d4f0; letter-spacing: .3px;
      animation: fadeUp 1s .35s both;
    }
    .sub b { color: #ffd86b; }
    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }

    /* ── CTA ── */
    .cta {
      margin-top: 34px;
      border: none; cursor: pointer;
      font-size: clamp(18px, 5.5vw, 24px); font-weight: 900; letter-spacing: .5px;
      color: #1a0e00; text-transform: uppercase;
      padding: 20px 40px; border-radius: 60px;
      background: linear-gradient(135deg, #ffe27a, #ffb33e 55%, #ff7eb3);
      box-shadow: 0 10px 40px rgba(255,170,60,.55), 0 0 0 0 rgba(255,200,90,.6);
      position: relative; overflow: hidden;
      animation: fadeUp 1s .5s both, beat 1.5s ease-in-out .5s infinite;
      -webkit-tap-highlight-color: transparent;
    }
    .cta::after {
      content: ''; position: absolute; top: 0; left: -120%; width: 70%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent);
      transform: skewX(-20deg); animation: shine 2.4s infinite;
    }
    @keyframes shine { 0% { left: -120%; } 60%,100% { left: 160%; } }
    @keyframes beat {
      0%,100% { transform: scale(1);   box-shadow: 0 10px 40px rgba(255,170,60,.55), 0 0 0 0 rgba(255,200,90,.55); }
      50%     { transform: scale(1.05); box-shadow: 0 14px 50px rgba(255,170,60,.7),  0 0 0 18px rgba(255,200,90,0); }
    }
    .cta:active { transform: scale(.96); }

    .hint {
      margin-top: 16px; font-size: 13px; color: #8a93b5; font-weight: 600;
      animation: fadeUp 1s .7s both;
    }
    .hint .live { color: #4ade80; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 10px #4ade80; margin-right: 5px; vertical-align: middle; animation: blink 1.3s infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  </style>
</head>
<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="wrap" onclick="grab()">

  <div class="emoji-row"><span>📱</span><span>🤑</span><span>🚀</span></div>

  <h1 class="headline headline-glow">
    <span class="line grad">Забрать</span>
    <span class="line grad">айфон</span>
    <span class="line grad">и накрутку</span>
  </h1>

  <div class="sub">розыгрыш <b>iPhone</b> + <b>100 000</b> просмотров каждому</div>

  <button class="cta" onclick="grab(event)">ЗАБРАТЬ 🎁</button>

  <div class="hint"><span class="dot"></span><span class="live">2 418 человек</span> забирают прямо сейчас</div>

</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  function grab(e) {
    if (e) e.stopPropagation();
    if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('heavy'); } catch(err) {} }
    const url = 'https://onelinkgo.ru/stream/nakrutka';
    if (tg && tg.openLink) tg.openLink(url); else window.open(url, '_blank');
  }

  // ── floating sparkles ──
  const sparks = ['✨','⭐','💎','📱','🤑','💰'];
  function spawnSpark() {
    const s = document.createElement('div');
    s.className = 'spark';
    s.textContent = sparks[Math.floor(Math.random() * sparks.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (16 + Math.random() * 20) + 'px';
    s.style.animationDuration = (4 + Math.random() * 4) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 9000);
  }
  setInterval(spawnSpark, 700);

  // ── live counter tick ──
  let live = 2418;
  setInterval(() => {
    live += Math.floor(Math.random() * 3) + 1;
    const el = document.querySelector('.live');
    if (el) el.textContent = live.toLocaleString('ru-RU') + ' человек';
  }, 2500);
</script>
</body>
</html>
