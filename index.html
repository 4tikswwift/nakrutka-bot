<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ты умница! Осталось пару шагов</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#e7c3d4; --ink:#34334d; --muted:#9a9ab4; --card:#ffffff;
      --pink:#ff4d8d; --blue:#2aabee; --green:#36c95f; --yellow:#ffce3a;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Nunito',sans-serif;
      -webkit-font-smoothing:antialiased;}

    /* фоновые сердечки */
    .hearts{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .hearts span{position:absolute;opacity:.18;animation:bobh 6s ease-in-out infinite}
    @keyframes bobh{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-14px) rotate(8deg)}}
    .rise-heart{position:fixed;bottom:-30px;z-index:0;pointer-events:none;animation:floatup linear forwards}
    @keyframes floatup{0%{transform:translateY(0) scale(.6);opacity:0}15%{opacity:.5}100%{transform:translateY(-110vh) scale(1);opacity:0}}

    .page{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:22px 18px 46px}

    .pop{opacity:0;transform:translateY(14px) scale(.98);animation:pop .5s ease forwards}
    .pop:nth-child(2){animation-delay:.07s}.pop:nth-child(3){animation-delay:.14s}
    .pop:nth-child(4){animation-delay:.21s}.pop:nth-child(5){animation-delay:.28s}.pop:nth-child(6){animation-delay:.35s}
    @keyframes pop{to{opacity:1;transform:translateY(0) scale(1)}}

    /* заголовок */
    .top{text-align:center;margin-bottom:16px}
    .top h1{font-size:27px;font-weight:800;line-height:1.18}
    .top .star{font-size:30px}
    .top p{font-size:16px;color:var(--muted);font-weight:700;margin-top:4px}

    /* таймер */
    .timer{background:#fff;border:2px solid #ffe0ea;border-radius:20px;
      padding:14px;text-align:center;margin-bottom:20px;box-shadow:0 6px 18px rgba(255,77,141,.10)}
    .timer .lbl{font-size:13px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}
    .timer .clock{font-size:40px;font-weight:900;color:var(--pink);line-height:1.1;margin-top:2px;
      font-variant-numeric:tabular-nums}
    .timer .clock .em{font-size:30px}

    /* шаги */
    .step{display:flex;align-items:center;gap:14px;background:#fff;border:2px solid #eef0f6;
      border-radius:22px;padding:16px 16px;margin-bottom:14px;box-shadow:0 6px 16px rgba(80,80,140,.06)}
    .num{flex-shrink:0;width:38px;height:38px;border-radius:50%;background:var(--yellow);
      display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#5a4500}
    .step .txt{flex:1;min-width:0}
    .step .txt .h{font-size:20px;font-weight:800;line-height:1.2}
    .step .txt .h .bang{color:var(--pink);font-size:26px;font-weight:900}
    .step .txt .s{font-size:14px;color:var(--muted);font-weight:700;margin-top:2px}
    .step .pic{flex-shrink:0;width:50px;height:50px;display:flex;align-items:center;justify-content:center}
    .step .pic svg{width:48px;height:48px;display:block}
    .step.big{padding:26px 18px}
    .step.big .num{width:44px;height:44px;font-size:21px}
    .step.big .txt .h{font-size:24px}
    .step.big .txt .s{font-size:16px;margin-top:4px}
    .step.big .pic{width:62px;height:62px}
    .step.big .pic svg{width:60px;height:60px}

    /* БОЛЬШАЯ кнопка */
    .bigbtn{display:block;width:100%;border:none;cursor:pointer;
      background:var(--green);color:#fff;font-size:26px;font-weight:900;letter-spacing:.5px;
      padding:26px 18px;border-radius:24px;margin:8px 0 4px;
      box-shadow:0 12px 0 #28a04a, 0 18px 30px rgba(54,201,95,.35);
      -webkit-tap-highlight-color:transparent;animation:boop 1.3s ease-in-out infinite;}
    .bigbtn:active{transform:translateY(8px);box-shadow:0 4px 0 #28a04a,0 8px 16px rgba(54,201,95,.3)}
    @keyframes boop{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .bigbtn .hand{display:block;font-size:16px;margin-top:6px;font-weight:800}

    /* низ: скрины */
    .proof{margin-top:30px}
    .ptitle{text-align:center;font-size:15px;font-weight:800;color:var(--muted);margin-bottom:14px}
    .compare{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .shot{position:relative;background:#fff;border:2px solid #eef0f6;border-radius:18px;padding:8px;
      box-shadow:0 6px 16px rgba(80,80,140,.06)}
    .shot img{width:100%;display:block;border-radius:11px}
    .tag{position:absolute;top:14px;left:14px;font-size:11px;font-weight:900;text-transform:uppercase;
      letter-spacing:.5px;padding:4px 11px;border-radius:30px;color:#fff}
    .tag.b{background:#ff6b6b}.tag.a{background:var(--green)}
    .shot .v{text-align:center;font-size:14px;font-weight:900;margin-top:8px}
    .shot.b .v{color:#ff6b6b}.shot.a .v{color:var(--green)}

    .love{text-align:center;margin-top:30px}
    .love .big{font-size:30px;font-weight:900;color:var(--pink);line-height:1.15}
    .love .row{font-size:30px;margin-top:8px;letter-spacing:4px}
  </style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="page">

  <div class="top pop">
    <h1><span class="star">🌟</span> Ты умница!</h1>
    <p>осталось пару шагов</p>
  </div>

  <div class="timer pop">
    <div class="lbl">ты должен всё сделать за</div>
    <div class="clock"><span id="t">10:00</span> <span class="em">⏰</span></div>
  </div>

  <div class="step pop">
    <div class="num">1</div>
    <div class="txt">
      <div class="h">Включи ВПН<span class="bang">!</span></div>
      <div class="s">(любой) · если ты из России</div>
    </div>
    <div class="pic">
      <!-- иконка ВПН: щит -->
      <svg viewBox="0 0 48 48" fill="none">
        <path d="M24 4l15 5v11c0 10-6.4 16.7-15 19-8.6-2.3-15-9-15-19V9l15-5z" fill="#36c95f"/>
        <path d="M16.5 24.5l5 5 10-10.5" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="step pop big">
    <div class="num">2</div>
    <div class="txt">
      <div class="h">Открой бота в телеграме</div>
      <div class="s">по кнопке внизу 👇</div>
    </div>
    <div class="pic">
      <!-- логотип телеграма -->
      <svg viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="24" fill="#2aabee"/>
        <path fill="#fff" d="M10.8 23.2l23.1-8.9c1.1-.4 2 .3 1.7 1.9l-3.9 18.5c-.3 1.3-1.1 1.6-2.2 1l-6.1-4.5-2.9 2.8c-.3.3-.6.6-1.3.6l.5-6.1 11-9.9c.5-.4-.1-.7-.8-.3l-13.6 8.6-5.9-1.8c-1.3-.4-1.3-1.3.3-2z"/>
      </svg>
    </div>
  </div>

  <button class="bigbtn" onclick="openBot()">НАЖМИ НА МЕНЯ<span class="hand">не забудь ВПН 👇</span></button>

  <!-- скрины внизу -->
  <div class="proof pop">
    <div class="ptitle">так это работает 👀</div>
    <div class="compare">
      <div class="shot b"><span class="tag b">до</span><img src="before.jpg" alt="до"/><div class="v">1 просмотр</div></div>
      <div class="shot a"><span class="tag a">после</span><img src="after.jpg" alt="после"/><div class="v">170 000</div></div>
    </div>

    <div class="love">
      <div class="big">МЫ ТЕБЯ ЛЮБИМ!</div>
      <div class="row">❤️ 💖 ❤️ 💕 ❤️</div>
    </div>
  </div>

</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg){ tg.ready(); tg.expand(); }

  function openBot(){
    if(tg&&tg.HapticFeedback){try{tg.HapticFeedback.impactOccurred('heavy')}catch(e){}}
    const url='https://t.me/LIKEMAX67';
    if(tg&&tg.openTelegramLink)tg.openTelegramLink(url);
    else if(tg&&tg.openLink)tg.openLink(url);
    else window.open(url,'_blank');
  }

  // таймер 10:00 -> 0
  let left=600;
  const tEl=document.getElementById('t');
  function tick(){
    const m=Math.floor(left/60), s=left%60;
    tEl.textContent=m+':'+String(s).padStart(2,'0');
    if(left>0) left--;
  }
  tick(); setInterval(tick,1000);

  // фоновые сердечки (статичные)
  const H=document.getElementById('hearts');
  const kinds=['❤️','💖','💕','💗','💓'];
  for(let i=0;i<14;i++){
    const s=document.createElement('span');
    s.textContent=kinds[i%kinds.length];
    s.style.left=Math.random()*95+'vw';
    s.style.top=Math.random()*95+'vh';
    s.style.fontSize=(18+Math.random()*26)+'px';
    s.style.animationDelay=(-Math.random()*6)+'s';
    H.appendChild(s);
  }
  // взлетающие сердечки
  function floatHeart(){
    const s=document.createElement('div');
    s.className='rise-heart';
    s.textContent=kinds[Math.floor(Math.random()*kinds.length)];
    s.style.left=Math.random()*100+'vw';
    s.style.fontSize=(16+Math.random()*22)+'px';
    s.style.animationDuration=(5+Math.random()*4)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),9000);
  }
  setInterval(floatHeart,900);
</script>
</body>
</html>
